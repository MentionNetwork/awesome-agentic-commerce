name: Link Check

on:
  schedule:
    - cron: '0 6 * * 1' # Mondays 06:00 UTC
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  lychee:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check links
        id: lychee
        uses: lycheeverse/lychee-action@v2
        with:
          args: --no-progress --accept 200..=204,206,301,302,308,403,429 --exclude-path node_modules 'README.md' 'articles/*.md'
          fail: false
      - name: Open issue on broken links
        if: steps.lychee.outputs.exit_code != 0
        uses: peter-evans/create-issue-from-file@v5
        with:
          title: 'Link check: broken links found'
          content-filepath: ./lychee/out.md
          labels: housekeeping
